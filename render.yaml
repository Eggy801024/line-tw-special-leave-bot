services:
  - type: web
    name: line-tw-special-leave-bot
    runtime: node
    plan: free
    buildCommand: ""
    startCommand: "node src/server.js"
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: GOOGLE_SPREADSHEET_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_EMAIL
        sync: false
      - key: GOOGLE_PRIVATE_KEY
        sync: false
      - key: TIME_ZONE
        value: Asia/Taipei
      - key: SHEET_NAME
        sync: false
      - key: LOG_SHEET_NAME
        sync: false
      - key: BINDING_SHEET_NAME
        sync: false
      - key: MAX_PER_DATE
        value: 3
      - key: NEW_MARK
        value: 特休
      - key: ELIGIBLE_SHIFT_MARK
        value: N1
      - key: ALLOW_CHANGE
        value: false
      - key: WORKER_ID_PATTERN
        value: "[A-Z]{1,3}\\d{3,4}"
      - key: GROUP_TEAM_MAP_JSON
        value: "{}"
